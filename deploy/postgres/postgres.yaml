apiVersion: v1
kind: Namespace
metadata:
  name: cofrap
---
apiVersion: v1
kind: Secret
metadata:
  name: cofrap-db
  namespace: cofrap
type: Opaque
stringData:
  POSTGRES_DB: cofrap
  POSTGRES_USER: cofrap
  POSTGRES_PASSWORD: "ChangeMe-Strong-Pwd"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: cofrap
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id       SERIAL PRIMARY KEY,
        username VARCHAR(255) UNIQUE NOT NULL,
        password TEXT,
        mfa      TEXT,
        gendate  BIGINT,
        expired  SMALLINT DEFAULT 0
    );
    CREATE INDEX IF NOT EXISTS idx_users_username ON users (username);
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: cofrap
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: cofrap
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgresql }
  template:
    metadata:
      labels: { app: postgresql }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef: { name: cofrap-db }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-pvc }
        - name: init
          configMap: { name: postgres-init }
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: cofrap
spec:
  selector: { app: postgresql }
  ports: [{ port: 5432, targetPort: 5432 }]
