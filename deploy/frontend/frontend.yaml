apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cofrap
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/cofrap/frontend:latest
          env:
            - name: OPENFAAS_GATEWAY
              value: http://gateway.openfaas:8080
          ports: [{ containerPort: 8000 }]
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cofrap
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cofrap-frontend
  namespace: cofrap
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: cofrap.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 80 }
