services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cofrap
      POSTGRES_USER: cofrap
      POSTGRES_PASSWORD: cofrap
    ports: ["5432:5432"]
    volumes:
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  frontend:
    build: ./frontend
    environment:
      OPENFAAS_GATEWAY: http://gateway:8080
    ports: ["8000:8000"]
    depends_on: [postgres]
